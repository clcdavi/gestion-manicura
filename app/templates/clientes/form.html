{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block header_title %}{{ titulo }}{% endblock %}
{% block breadcrumb %}
<nav class="breadcrumb">
  <a href="/clientes">Clientes</a>
  <span class="bc-sep">/</span>
  <span class="bc-current">{{ titulo }}</span>
</nav>
{% endblock %}

{% block content %}
<div class="form-container">
  <form method="post" class="form-card">
    <div class="form-group">
      <label for="nombre">Nombre completo *</label>
      <input type="text" id="nombre" name="nombre" required
             value="{{ cliente.nombre if cliente else '' }}" placeholder="Ej: Valentina Gómez">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono"
               value="{{ cliente.telefono if cliente else '' }}" placeholder="11-1234-5678">
      </div>
      <div class="form-group">
        <label for="fecha_nacimiento">Fecha de cumpleaños</label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento"
               value="{{ cliente.fecha_nacimiento.isoformat() if cliente and cliente.fecha_nacimiento else '' }}">
      </div>
    </div>

    <div class="form-group">
      <label for="notas">Notas (alergias, preferencias, etc.)</label>
      <textarea id="notas" name="notas" rows="3" placeholder="Ej: Alérgica al formaldehído. Prefiere colores nude.">{{ cliente.notas if cliente else '' }}</textarea>
    </div>

    <div class="form-actions">
      <a href="/clientes" class="btn btn-ghost">Cancelar</a>
      {% if cliente %}
      <button type="button" class="btn btn-danger"
              onclick="if(confirm('¿Eliminar a ' + {{ cliente.nombre | tojson }} + '? Esta acción no se puede deshacer.')) document.getElementById('formEliminarCliente').submit()">
        Eliminar cliente
      </button>
      {% endif %}
      <button type="submit" class="btn btn-primary">
        {{ 'Guardar cambios' if cliente else 'Crear cliente' }}
      </button>
    </div>
  </form>

  {% if cliente %}
  <form id="formEliminarCliente" method="post" action="/clientes/{{ cliente.id }}/eliminar" style="display:none"></form>
  {% endif %}
</div>
{% endblock %}
